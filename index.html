<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二進数おみくじ</title>
    <!-- M PLUS 1p -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- スタイルシート -->
    <link rel="stylesheet" href="style.css">
    <!-- ファビコン -->
    <link rel="icon" type="image/x-icon" href="https://shimataiyaki.github.io/favicon.ico">
</head>
<body>

<!-- ===== 固定ヘッダー（全幅・常時ハンバーガー） ===== -->
<header class="site-header">
    <div class="header-container">
        <a href="./" class="site-title">二進数おみくじ</a>
        
        <!-- ハンバーガーボタン（常時表示） -->
        <button class="menu-toggle" id="menuToggle" aria-label="メニュー">
            <span></span><span></span><span></span>
        </button>
        
        <!-- 全幅ナビメニュー -->
        <ul class="nav-menu" id="navMenu">
            <div class="nav-menu-inner">
                <li><a href="#howto">遊び方</a></li>
                <li><a href="https://note.com/shimataiyaki" target="_blank" rel="noopener">note</a></li>
                <li><a href="https://github.com/shimataiyaki/binary-omikuji" target="_blank" rel="noopener">GitHub</a></li>
            </div>
        </ul>
    </div>
</header>

<!-- ===== メインコンテンツ ===== -->
<main class="app-main">
    <div class="container">
        <div class="subtitle">おみくじを引く</div>

        <!-- おみくじ札 10枚 -->
        <div class="cards-grid" id="cardsGrid"></div>

        <!-- 抽選結果表示エリア -->
        <div class="result-area">
            <div id="binary-display">
                <span id="binary-number">----</span>
                <span id="binary-suffix"></span>
            </div>
            <div id="waiting-message" class="waiting-text"></div>
        </div>

        <!-- 案内文（シンプルに左ボーダーのみ） -->
        <div id="howto" class="guide-text">
            ▶ 表示された数字を部員に見せて、おみくじの紙を受け取ってください。
        </div>

        <!-- フッター -->
        <footer class="app-footer">
            © 2026 Shimataiyaki
        </footer>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
