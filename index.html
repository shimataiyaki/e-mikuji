<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二進数おみくじ</title>
    <!-- ファビコン -->
    <link rel="icon" type="image/x-icon" href="https://shimataiyaki.github.io/images/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="https://shimataiyaki.github.io/images/favicon.ico">
    <link rel="apple-touch-icon" href="https://shimataiyaki.github.io/images/favicon.ico">
    <!-- 外部CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- メインコンテンツ（ヘッダーなし） -->
    <main class="app-main">
        <div class="container">
            <!-- タイトル -->
            <h1 class="site-title">二進数おみくじ</h1>
            <!-- 見出し -->
            <div class="subtitle">おみくじを引く</div>

            <!-- おみくじ札 16枚（JavaScriptで生成） -->
            <div class="cards-grid" id="cardsGrid"></div>

            <!-- 抽選結果表示スペース -->
            <div class="result-area">
                <div id="binary-display">
                    <span id="binary-number">----</span>
                    <span id="binary-suffix"></span>
                </div>
                <div id="waiting-message" class="waiting-text"></div>
                <!-- リセットボタン -->
                <button id="resetButton" class="reset-button">次の方へ</button>
            </div>

            <!-- 案内文 -->
            <div id="howto" class="guide-text">
                ▶ 表示された数字を部員に見せて、おみくじの紙を受け取ってください。
            </div>

            <!-- フッター（コピーライトのみ・リンクなし） -->
            <footer class="app-footer">
                <span>© 2026 Shimataiyaki</span>
            </footer>
        </div>
    </main>

    <!-- 外部JavaScript -->
    <script src="script.js"></script>
</body>
</html>
