<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二進数おみくじ</title>
    <!-- 外部CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://drive.google.com/uc?export=view&id=1hkVm4AwXeReCl8k7fxphcF7FLdBskFHr">
</head>
<body>

    <!-- ▼ 固定ヘッダー ▼ -->
    <header class="site-header">
        <div class="header-container">
            <div class="site-title">
                <a href="./">二進数おみくじ</a>
            </div>
            
            <!-- ハンバーガーボタン（モバイル表示） -->
            <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <!-- ナビゲーションメニュー -->
            <nav class="site-nav" id="navMenu">
                <ul>
                    <li><a href="#">遊び方</a></li>
                    <li><a href="https://note.com/shimataiyaki" target="_blank" rel="noopener">note</a></li>
                    <li><a href="https://github.com/shimataiyaki/binary-omikuji" target="_blank" rel="noopener">GitHub</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 既存のメインコンテンツ（変更なし） -->
    <div class="container">
        <!-- ヘッダー（旧h1はサイトタイトルと重複するため削除。代わりにサブタイトルを残す） -->
        <div class="subtitle">おみくじを引く</div>

        <!-- おみくじ札 10枚 -->
        <div class="cards-grid" id="cardsGrid"></div>

        <!-- 抽選結果表示スペース -->
        <div class="result-area">
            <div id="binary-display">
                <span id="binary-number">----</span>
                <span id="binary-suffix"></span>
            </div>
            <div id="waiting-message" class="waiting-text"></div>
        </div>

        <!-- 案内文（遊び方アンカー） -->
        <div id="howto" class="guide-text">
            ▶ 表示された数字を部員に見せて、おみくじの紙を受け取ってください。
        </div>

        <!-- フッター -->
        <footer class="footer">
            <span style="opacity:0.6;">© 2026 Shimataiyaki</span>
        </footer>
    </div>

    <!-- 外部JavaScript -->
    <script src="script.js"></script>
</body>
</html>
