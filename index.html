<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタルおみくじ</title>
    <!-- ファビコン -->
    <link rel="icon" type="image/x-icon" href="https://shimataiyaki.github.io/images/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="https://shimataiyaki.github.io/images/favicon.ico">
    <link rel="apple-touch-icon" href="https://shimataiyaki.github.io/images/favicon.ico">
    <!-- 外部CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 固定ヘッダー -->
    <header class="site-header">
        <div class="header-container">
            <a href="./" class="site-title">デジタルおみくじ</a>
            <button class="menu-toggle" id="menuToggle" aria-label="メニュー" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <div class="nav-menu-inner">
                    <li><a href="#howto">遊び方</a></li>
                    <li><a href="https://note.com/shimataiyaki" target="_blank" rel="noopener">note</a></li>
                    <li><a href="https://github.com/shimataiyaki/binary-omikuji" target="_blank" rel="noopener">GitHub</a></li>
                </div>
            </ul>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="app-main">
        <div class="container">
            <!-- 見出し -->
            <div class="subtitle">おみくじを引く</div>

            <!-- おみくじ札 16枚（JavaScriptで生成） -->
            <div class="cards-grid" id="cardsGrid"></div>

            <!-- 抽選中メッセージ -->
            <div class="waiting-area" id="waitingMessage"></div>

            <!-- 遊び方セクション -->
            <div class="guide-section">
                <div class="guide-text">
                    ▶ 札を選んでタップしてください
                </div>
            </div>

            <!-- ポップアップ（モーダル） -->
            <div id="resultModal" class="modal">
                <div class="modal-content">
                    <span class="modal-close" id="modalClose">&times;</span>
                    <div class="modal-title">抽選結果</div>
                    <div id="modalNumber" class="modal-number">五</div>
                    <div class="modal-unit">番</div>
                    <div class="modal-guide">
                        ▶ 表示された数字を部員に見せて、<br>　おみくじの紙を受け取ってください。
                    </div>
                </div>
            </div>

            <!-- フッター（コピーライトのみ） -->
            <footer class="app-footer">
                <span>© 2026 Shimataiyaki</span>
            </footer>
        </div>
    </main>

    <!-- 外部JavaScript -->
    <script src="script.js"></script>
</body>
</html>
